name: Check Required Assignment Files

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-files:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;

            const REQUIRED = {
              'assignment-1': [
                'assignment-1/docker-compose.yml',
                'assignment-1/compose_screenshot.png'
              ],
              'assignment-2': [
                'ANSWERS.md',
                'assignment-2/screencap-archsites.png',
                'assignment-2/screencap-layergroup.png'
              ],
              'assignment-3': [
                'assignment-3/landuse.sld',
                'assignment-3/roads.sld',
                'assignment-3/pois.sld',
                'assignment-3/geoserver_layer_group_preview.png',
                'assignment-3/qgis_layer_group_preview.png'
              ],
              'assignment-4': [
                'assignment-4/screenshot-getting-started.png',
                'assignment-4/docker-compose.yml',
                'assignment-4/geoserver.html',
                'assignment-4/Dockerfile',
                'assignment-4/docker-compose-geoserver-screenshot.png'
              ]
            };

            const required = REQUIRED[branch];
            if (!required) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Branch \`${branch}\` is not a recognized assignment branch. Expected one of: ${Object.keys(REQUIRED).join(', ')}`
              });
              return;
            }

            const filesResp = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });
            const presentFiles = new Set(filesResp.data.map(f => f.filename));

            let rows = '';
            let allPresent = true;
            for (const file of required) {
              const present = presentFiles.has(file);
              if (!present) allPresent = false;
              rows += `| ${present ? '✅' : '❌'} | \`${file}\` |\n`;
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            for (const comment of comments.data) {
              if (comment.user.login === 'github-actions[bot]' && comment.body.includes('Required Files')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }

            const status = allPresent ? '✅ All required files present!' : '❌ Some required files are missing — check the table below.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Required Files — \`${branch}\`\n\n${status}\n\n| Status | File |\n|--------|------|\n${rows}\n_Push another commit to re-run this check._`
            });
